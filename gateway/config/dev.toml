# ─────────────────────────────────────────────────────────────────────────────
# OptRouter Gateway — 开发环境覆盖（APP_ENV=dev，默认）
# 只需写与 base.toml 不同的值
# ─────────────────────────────────────────────────────────────────────────────

[postgres]
# 开发：多预热几条连接，避免冷启动等待；获取连接超时短一点
min_connections = 3
acquire_timeout_secs = 15

[cache]
# 开发时缓存短一点，改了 key 状态能快速生效
key_ttl_secs = 300
